name: spendguard
description: SpendGuard - smart spending protection app.
publish_to: "none"

version: 1.0.0+3

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  geolocator: ^14.0.2
  flutter_local_notifications: ^19.4.0
  shared_preferences: ^2.5.3
  http: ^1.2.2

  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/spendguard_app_icon.png
    - assets/images/founder_welcome.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/spendguard_app_icon.png
  remove_alpha_ios: true