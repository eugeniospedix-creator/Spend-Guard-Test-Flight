workflows:
  spendguard-release:
    name: SpendGuard Release
    instance_type: mac_mini_m2
    max_build_duration: 120

    integrations:
      app_store_connect: Codemagic

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.eugeniospedicato.spendguard

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Install pods
        script: |
          cd ios
          pod install
          cd ..

      - name: Apply iOS signing
        script: xcode-project use-profiles

      - name: Build Android APK
        script: flutter build apk --release

      - name: Build iOS IPA
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/**/outputs/**/*.apk
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true