workflows:
  spendguard-release:
    name: SpendGuard Release
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.eugeniospedicato.spendguard

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Set up iOS signing
        script: |
          xcode-project use-profiles

      - name: Build Android APK
        script: |
          flutter build apk --release

      - name: Build iOS IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/**/outputs/**/*.apk
      - build/ios/ipa/*.ipa